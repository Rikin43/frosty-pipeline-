name: Deploy to AWS S3

# Trigger: runs automatically on every push to the main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout your repository code
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Step 2: Configure AWS credentials using GitHub Secrets
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # Step 3: Sync all files to the S3 bucket
      # --delete removes files in S3 that are no longer in the repo
      - name: Sync files to S3
        run: |
          aws s3 sync . s3://icecream-site-frostypipeline --delete

      # Step 4: (Optional) Invalidate CloudFront cache if you use a CDN
      # Uncomment this block only if you have a CloudFront distribution
      # - name: Invalidate CloudFront Cache
      #   run: |
      #     aws cloudfront create-invalidation \
      #       --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
      #       --paths "/*"
